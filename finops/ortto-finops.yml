description: >-
  FinOps view of Ortto spend. Ortto bills a fixed monthly (or annual)
  subscription tied to the number of contacts in the account rather than
  per-API-call usage; the same subscription governs both app and API access.
  Additional contacts and email volume are billed as add-ons at $99/month per
  100,000. Transactional email and SMS are features of supporting plans. Cost
  is therefore driven primarily by contact count and add-on volume, not by API
  request count.
notes: >-
  Plan prices and add-on rates change; verify against the Ortto pricing page
  during reconciliation. Transactional email via API requires plan support and
  Ortto approval.
sources:
- https://ortto.com/pricing/
