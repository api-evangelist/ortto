meters:
- name: plan_subscription
  description: Recurring plan fee tied to the contact tier (Starter, Professional, Business, Enterprise).
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: contacts
  description: Number of contacts in the account, the primary driver of plan tier and add-on cost.
  unit: contacts
  aggregation: max
  dimensions:
  - account
- name: add_on_contacts
  description: Additional contacts beyond the plan allowance, billed per 100,000.
  unit: contacts
  aggregation: sum
  dimensions:
  - account
- name: add_on_email_volume
  description: Additional email volume beyond the plan allowance, billed per 100,000.
  unit: emails
  aggregation: sum
  dimensions:
  - account
- name: transactional_messages
  description: Transactional email and SMS sent via the API on supporting plans.
  unit: messages
  aggregation: sum
  dimensions:
  - account
  - channel
principles:
- name: Visibility
  description: Track contact count against the plan allowance; watch for tier upgrades and add-on triggers.
- name: Allocation
  description: Tag custom API keys per integration/team to attribute API-driven contact and message growth.
- name: Optimization
  description: Archive or delete stale contacts to stay within tier; batch merge calls (up to 100) to reduce overhead; right-size the plan to actual contact volume.
- name: Accountability
  description: Assign an owner for the Ortto subscription; review contact growth and add-on charges monthly against budget.
